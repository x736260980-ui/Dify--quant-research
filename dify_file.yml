            \   包含标的近期涨跌幅、最高/最低价边界、换手率及收盘价时序轨迹。\n3. 【B站舆情与情绪】(Social Sentiment)：\n\
            {{#conversation.findings#}}\n   包含消费者、散户对于该标的（或相关产品/事件）的最真实反馈与情绪倾向。"
